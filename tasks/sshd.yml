---
### Installation
- name: "Be sure sshd is installed (APT based)"
  ansible.builtin.apt:
    pkg: 'openssh-server'
    state: present
  when: ansible_pkg_mgr == 'apt'
  become: true
  tags:
    - install

# Part of the base package
# - name: Be sure sshd is installed (FreeBSD based)
#   pkgng: name='ssh' state=present
#   when: ansible_pkg_mgr == 'pkgng'
#   become: true
#   tags: sshd

### Configuration
- name: "Be sure sshd is configured"
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: "{{ root_group }}"
    mode: '0600'
    validate: /usr/sbin/sshd -t -f %s
    backup: true
  become: true
  notify:
    - Restart sshd
  tags:
    - conf

# Maybe should be removed and should use systemd.tmpfiles ?
- name: "Be sure sshd has its directory configured"
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: "{{ root_group }}"
    mode: '0755'
  become: true
  tags:
    - conf

# FIXME THIS SHOULD BE REMOVED
- name: "TEMPORARY Remove old sysclt file"
  ansible.builtin.file:
    path: /etc/sysctl.d/10-sshd-admin.conf
    state: absent
  become: true
  when: inventory_hostname in groups['workstations']
  tags:
    - conf

# All Diffie-Hellman moduli in use should be at least 3072-bit-long
# (they are used for diffie-hellman-group-exchange-sha256) as per our
# Key management Guidelines recommendations. See also man moduli.
#
# To deactivate short moduli in two commands:
# awk '$5 >= 3071' /etc/ssh/moduli > /etc/ssh/moduli.tmp && mv /etc/ssh/moduli.tmp /etc/ssh/moduli

- name: "Install motd, issue and issue.net"
  ansible.builtin.template:
    src: "etc/{{ item }}"
    dest: "/etc/{{ item }}"
    owner: root
    group: "{{ root_group }}"
    mode: '0644'
  with_items: "{{ motd_files }}"
  become: true
  notify:
    - Restart sshd
  tags:
    - conf

# Generate an OpenSSH keypair with a different algorithm
- name: "Generate ed25519 key pair for host keys"
  community.crypto.openssh_keypair:
    path: /etc/ssh/ssh_host_ed25519_key
    type: ed25519
    owner: root
    group: "{{ root_group }}"
    force: false
  become: true

- name: "Be sure forbidden keys are deleted"
  ansible.builtin.file:
    name: "/etc/{{ item }}"
    state: absent
  become: true
  loop:
    - ssh/ssh_host_dsa_key
    - ssh/ssh_host_dsa_key.pub
    - ssh/ssh_host_rsa_key
    - ssh/ssh_host_rsa_key.pub
    - ssh/ssh_host_ecdsa_key
    - ssh/ssh_host_ecdsa_key.pub
  tags:
    - conf

- name: "Be sure sshd is running and enabled (Debian)"
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: true
  when: ansible_distribution == 'Debian'
  become: true
  tags:
    - conf

- name: "Be sure sshd is running and enabled (FreeBSD)"
  ansible.builtin.service:
    name: sshd
    state: started
    enabled: true
  when: ansible_distribution == 'FreeBSD'
  become: true
  tags:
    - conf

